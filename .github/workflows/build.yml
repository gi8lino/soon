name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
      actions: write

    env:
      BUNDLE_ID: io.github.gi8lino.soon
      XCODE_VERSION: "26"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Print toolchain info
        shell: bash
        run: |
          sw_vers
          uname -a
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --show-sdk-path
          xcrun --show-sdk-version

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Tag: $TAG"
          echo "Version: $VERSION"

      - name: Clean build directories
        shell: bash
        run: |
          make clean

      - name: Build release package
        shell: bash
        run: |
          make package \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}" \
            BUNDLE_ID="${BUNDLE_ID}"

      - name: Verify release package
        shell: bash
        run: |
          make verify-release \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: Soon-${{ steps.version.outputs.version }}
          path: dist/Soon-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/Soon-${{ steps.version.outputs.version }}.zip" \
            --generate-notes

      - name: Trigger Homebrew formula update workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run update-homebrew-formula.yml \
            -f tag="${{ steps.version.outputs.tag }}" \
            -f version="${{ steps.version.outputs.version }}"
